<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paris littéraire</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="language-screen" class="v-screen-full">
        <div class="v-welcome-container">
            <h1 class="v-main-logo">PARIS LITTÉRAIRE</h1>
            <div class="v-lang-grid">
                <button class="v-btn-lang" onclick="setLanguage('fr')">FRANÇAIS</button>
                <button class="v-btn-lang" onclick="setLanguage('en')">ENGLISH</button>
            </div>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <header class="v-top-bar">
            <div class="v-limit-container">
                <button class="v-btn-stamps-trigger" onclick="openModal()">
                    <i class="fa-solid fa-stamp"></i> <span id="btn-stamps-text">Mes Étampes</span>
                </button>
            </div>
        </header>

        <main class="v-story-wrapper">
            <article class="v-story-card">
                <h2 id="story-title" class="v-story-h"></h2>
                <p id="author-name" class="v-author-p"></p>
                <div class="v-decorative-line"></div>
                <div id="story-content" class="v-story-body"></div>
            </article>

            <section id="ad-container" class="v-partner-section">
                </section>
        </main>

       <footer class="v-bottom-nav">
    <div class="v-nav-inner">
        <button class="v-circle-btn v-like-btn" onclick="toggleLike(this)">
            <i class="fa-solid fa-heart"></i>
        </button>

        <button class="v-circle-btn v-audio-btn" onclick="toggleAudio()" id="audio-control">
            <i class="fa-solid fa-play"></i>
        </button>
        
        <button class="v-action-next" onclick="loadStory()">
            <span class="v-next-label">AUTRE TEXTE</span>
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </div>
</footer>
    </div>
<a href="https://www.instagram.com/vichylitteraire/" target="_blank" class="v-insta-top-link">
            <i class="fa-brands fa-instagram"></i>
        </a>

        <div class="v-modal-box">
            <button class="v-modal-close" onclick="closeModal()">&times;</button>
            <h3 class="v-modal-h">Ma Collection</h3>
            <p class="v-modal-desc">10 visites = 1 cadeau</p>
            
            <div id="stamps-grid" class="v-stamps-grid">
                </div>
            
            <div id="modal-status" class="v-modal-footer"></div>
        </div> -->
    </div>

    <script src="stories_fr.js"></script>
    <script src="stories_en.js"></script>
    <script src="script.js"></script>
</body>
</html>
